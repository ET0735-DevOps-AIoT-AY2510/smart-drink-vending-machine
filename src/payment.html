<!DOCTYPE html>
<html lang="en">
<head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8"> 
        <title>Payment Page</title>
        <link rel="stylesheet" href="payment.css">
        <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <header>
      <h1>Payment</h1>
    </header>
            <hr>
    <a href="drink-page.html" class="return-button"> ← Return</a>
    <main>
      <div class="drink-image">
        <img src="images/coca_cola.png" alt="Drink 1" class="drink-image" id="drink-image">
      </div>
      <div class="details">
        <p class="selected-item">You have selected: <strong id="drink-name">Coca Cola</strong></p>
        <p class="total">Your total is: <strong id="drink-price">$1.30</strong></p>
        <button class="pay-button">Make payment</button>
      </div>
    </main>
  </div>

  <script>
    function getQueryParams() {
      const params = {};
      window.location.search.substring(1).split("&").forEach(pair => {
        const [key, value] = pair.split("=");
        params[key] = decodeURIComponent(value);
      });
      return params;
    }

    function updatePaymentPage() {
      const params = getQueryParams();
      if (params.drink && params.price) {
        const drinkImage = document.getElementById('drink-image');
        const drinkName = document.getElementById('drink-name');
        const drinkPrice = document.getElementById('drink-price');

        //update image src and alt
        drinkImage.src = 'images/' + params.drink;
        drinkImage.alt = params.drink.split('.')[0].replace('_', ' ');

        //update drink name 
        const nameFormatted = drinkImage.alt.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        drinkName.textContent = nameFormatted;

        //update price with $ prefix
        drinkPrice.textContent = '$' + params.price;
      }
    }

    updatePaymentPage();

    document.querySelector('.pay-button').addEventListener('click', () => {
          window.location.href = 'collection.html';
    });
  </script>
</body>
</html>
