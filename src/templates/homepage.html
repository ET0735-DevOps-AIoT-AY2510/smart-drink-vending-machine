<!DOCTYPE html>
<html lang="en">
<head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8"> 
        <title>Homepage</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='homepage.css') }}">
        <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2>Welcome to the drink vending machine!</h2>
            <button id="adminLoginBtn" class="admin-login-btn" onclick="location.href='{{ url_for('admin_login') }}'">Admin Login</button>
        </div>

        <div class="auth-buttons">
            <p class="button-label">Get started by clicking here!</p>
            <button id="signupBtn" class="auth-btn signup-btn">Sign Up</button>
            <p class="button-label">Already have an account? Click here!</p>
            <button id="loginBtn" class="auth-btn login-btn">Log In</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signupBtn = document.getElementById('signupBtn');
            const loginBtn = document.getElementById('loginBtn');
            
            signupBtn.addEventListener('click', function() {
                window.location.href = '{{ url_for('signup') }}'; 
            });

            loginBtn.addEventListener('click', function() {
                window.location.href = '{{ url_for('login') }}'; 
            });

            const buttons = document.querySelectorAll('.auth-btn');
            buttons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.05)';
                    this.style.transition = 'transform 0.2s ease';
                });
                
                button.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body>
</html>
