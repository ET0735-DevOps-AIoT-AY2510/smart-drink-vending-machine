<!DOCTYPE html>
<html lang="en">
<head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8"> 
        <title>Collection Page</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='collection.css') }}">
        <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
        <style>
            .barcode-container {
                position: relative;
                display: inline-block;
            }
            .barcode-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: url('data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><line x1="0" y1="0" x2="100" y2="100" stroke="red" stroke-width="5"/><line x1="0" y1="100" x2="100" y2="0" stroke="red" stroke-width="5"/></svg>') no-repeat center center;
                background-size: contain;
            }
        </style>
</head>
<body>
    <div class="container">
    <header>
      <h1>Collection</h1>
    </header>
            <hr>
        <p>Payment successful!</p>
        {% if drink %}
        <div class="drink-image-display">
            <img src="{{ url_for('static', filename=drink['image_url']) }}" alt="{{ drink['name'] }}" style="width: 100px; height: 100px; object-fit: contain;">
            <h3>{{ drink['name'] }}</h3>
        </div>
        {% endif %}
        <div class="barcode-container"> 
            <img src="{{ url_for('static', filename='barcodes/' + barcode + '.png') }}" alt="Barcode: {{ barcode }}">
            {% if out_of_order %}
            <div class="barcode-overlay"></div>
            {% endif %}
        </div>
        {% if out_of_order %}
        <p style="color: red;">Drink redemption currently un<b>available</b></p>
        {% else %}
        <p>Flash this barcode at the vending machine and click "#" to collect your drink!</p>
        {% endif %}
        <button id="returnButton" onclick="location.href='{{ url_for('drink_page') }}'">Return</button>
    </div>

    
</body>
</html>
