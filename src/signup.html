<!DOCTYPE html>
<html lang="en" dir="ltr">

    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8"> 
        <title>Signup Page</title>
        <link rel="stylesheet" href="signup.css">
        <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
    </head>

    <body>

<form id="signupForm" class="box" onsubmit="return validatePassword()"> 
    <a href="homepage.html" class="return-button"> ← Return</a>
    <img src="images/vending-machine.png" alt="Vending Machine Logo" class="logo">
    <h1>Drink Vending Machine</h1>
    <input type="text" class="input-field" placeholder="Username" required>
    <input type="password" id="password" class="input-field" placeholder="Password" required>
    <input type="password" id="confirm-password" class="input-field" placeholder="Confirm Password" required>
<label class="show-password-label">
  <input type="checkbox" onclick="togglePassword()"> Show Password
</label>
    <p id="error-message" style="color: red; font-size: 14px;"></p>
    <button type="submit" class="submit-btn">Create Account</button>
</form>

<script>
        function validatePassword() {
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const errorMessage = document.getElementById("error-message");

            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match!";
                return false;
            }

            errorMessage.textContent = ""; 
            return true;
        }
        function togglePassword() {
            const password = document.getElementById("password");
            const confirmPassword = document.getElementById("confirm-password");

            if (password.type === "password") {
                password.type = "text";
                confirmPassword.type = "text";
            } else {
                password.type = "password";
                confirmPassword.type = "password";
            }
        }

        document.getElementById('signupForm').addEventListener('submit', function(event) {
            if (!validatePassword()) {
                event.preventDefault();
                return;
            }
            event.preventDefault();
            window.location.href = 'drink-page.html';
        });
</script>
    </body>
</html>
