version: '3.8'

services:
  vending-machine:
    build: .
    container_name: vending-machine-app
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app:$PYTHONPATH
      - FLASK_ENV=production
    restart: unless-stopped
    command: /bin/bash -c "/app/start.sh"
